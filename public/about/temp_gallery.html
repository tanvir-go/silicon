<!DOCTYPE html>
<html>
<head>
  <title>Image Gallery</title>
  <style>
    body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 4px; display: block; margin: 0 auto 10px; }
    .filename { font-weight: bold; font-size: 14px; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Silicon Computing Image Gallery</h1>
  <div class="grid">

      <div class="filename">nasir_feroz_302x300.png</div>
    </div>
    <div class="card">

      <div class="filename">nasir_feroz_150.png</div>
    </div>
    <div class="card">

</html>
